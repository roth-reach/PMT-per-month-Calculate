<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="pmtsyle.css">
</head>
<body>
    <div class="all">
        <h2><font color="white">Welcome to PMT calculator</font></h2>
    <form action="">
        <label for="loanAmount" class="label1">Loan Amount</label><br>
        <input type="number" id="loanamount" name="loanamount" placeholder="Enter loan amount" class="input"><br><br>
        <label for="interestRate" class="label2">Interest Rate (month)</label><br>
        <input type="number" id="interestrate" name="interestrate" step="0.01" placeholder="Enter interest rate" class="input"><br><br>
        <label for="loanTerm" class="label3">Loan Term (months)</label><br>
        <input type="number" id="loanterm" name="loanterm" placeholder="Enter loan term" class="input"><br><br>
        <div class="Btn"><input type="button" id="calculatePMT" value="Calculate PMT" class="btn"></div>
        
    </form>
    <div class="result">
        <h2>PMT: $<span id="pmtResult">0</span></h2>
    </div>
    
    </div>
    <script src="syspmt.js"></script>
</body>
</html>
